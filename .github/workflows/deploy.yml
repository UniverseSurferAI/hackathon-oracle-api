name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev
      
      - name: Build and push Docker image
        run: |
          docker build -t europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }} .
          docker push europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }}
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hackathon-oracle-api \
            --image=europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }} \
            --region=europe-west1 \
            --platform=managed \
            --allow-unauthenticated