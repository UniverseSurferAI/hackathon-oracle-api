name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      
      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 -t europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }} .
          docker push europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }}
      
      - name: Check existing service
        run: |
          echo "Checking service status..."
          gcloud run services describe hackathon-oracle-api --region=europe-west1 --format="value(status.url)" 2>&1 || echo "Service does not exist yet"
      
      - name: Deploy to Cloud Run
        run: |
          echo "Deploying with image: europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }}"
          gcloud run deploy hackathon-oracle-api \
            --image=europe-west1-docker.pkg.dev/predictionpro-io/cloud-run-source-deploy/hackathon-oracle-api:${{ github.sha }} \
            --region=europe-west1 \
            --platform=managed \
            --allow-unauthenticated \
            --timeout=10m 2>&1
          echo "Deployment complete!"
          echo "Service URL:"
          gcloud run services describe hackathon-oracle-api --region=europe-west1 --format="value(status.url)"